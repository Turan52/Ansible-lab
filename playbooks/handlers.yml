---
- name: Verify apache installation
  hosts: localhost
  become: yes
  tasks:
    - name: Ensure apache is at the latest version
      apt:
        name: apache2
        state: latest

    - name: Copy updated apache config file
      copy:
        src: /tmp/apache2.conf
        dest: /etc/apache2/apache2.conf
      notify:
        - Restart apache

    - name: Ensure apache is running
      service: 
        name: apache2
        state: started

  handlers:
    - name: Restart apache
      service:
        name: apache2
        state: restarted 
